server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /v1/ {
    proxy_pass http://api:4310;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
  }

  location /api/ {
    proxy_pass http://api:4310;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location = /health {
    proxy_pass http://api:4310/health;
  }

  location = /metrics {
    proxy_pass http://api:4310/metrics;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
