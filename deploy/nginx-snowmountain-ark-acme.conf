server {
    listen 80;
    server_name 106.14.73.99;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /ark/ {
        return 301 https://106.14.73.99$request_uri;
    }

    # Preserve the server's existing direct-IP applications while this exact
    # Host vhost owns the IP-address ACME challenge.
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
