limit_req_zone $binary_remote_addr zone=snowmountain_login:10m rate=5r/m;

server {
    listen 80;
    server_name 106.14.73.99;

    # A host-network Cloudflare tunnel connects from loopback and supplies the
    # authenticated client address in this header.
    set_real_ip_from 127.0.0.1;
    real_ip_header CF-Connecting-IP;
    real_ip_recursive on;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ^~ /ark/ {
        return 301 https://106.14.73.99$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    listen 8443 ssl http2;
    server_name 106.14.73.99;

    ssl_certificate /etc/letsencrypt/live/106.14.73.99/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/106.14.73.99/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SNOWMOUNTAIN_TLS:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    client_max_body_size 2m;

    location = /ark/metrics {
        return 404;
    }

    location = /ark/v1/auth/login {
        limit_req zone=snowmountain_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:4311/v1/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ark/ {
        proxy_pass http://127.0.0.1:4311/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /ark;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location = / {
        return 302 /ark/;
    }
}
