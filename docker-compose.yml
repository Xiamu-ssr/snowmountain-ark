services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATA_DIR: /app/data
      HOST: 0.0.0.0
      PORT: 4310
      SANDBOX_DRIVER: local
      MARKET_INDEX_URL: https://xiamu-ssr.github.io/snowmountain-market/api/catalog.json
      VAULT_MASTER_KEY: ${VAULT_MASTER_KEY:-}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
    volumes:
      - ./data:/app/data
    ports:
      - "4310:4310"
    restart: unless-stopped
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "4311:80"
    restart: unless-stopped
